name: Daily Brief

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. This maps to 08:00 / 12:00 / 18:00 in Asia/Shanghai.
    - cron: "0 0,4,10 * * *"

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  gate:
    name: Time gate
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check schedule
        id: check
        env:
          REPORT_TZ: ${{ vars.REPORT_TZ }}
          REPORT_DAYS: ${{ vars.REPORT_DAYS }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TZ_VAL="${REPORT_TZ:-Asia/Shanghai}"
          DAYS_VAL="${REPORT_DAYS:-*}"

          NOW_DOW=$(TZ="$TZ_VAL" date +%w)

          day_match=false
          if [ "$DAYS_VAL" = "*" ]; then
            day_match=true
          else
            IFS=',' read -ra DLIST <<< "$DAYS_VAL"
            for d in "${DLIST[@]}"; do
              d_trim="${d// /}"
              if [[ "$d_trim" == *-* ]]; then
                start="${d_trim%-*}"
                end="${d_trim#*-}"
                if [ "$NOW_DOW" -ge "$start" ] && [ "$NOW_DOW" -le "$end" ]; then
                  day_match=true
                  break
                fi
              elif [ "$NOW_DOW" = "$d_trim" ]; then
                day_match=true
                break
              fi
            done
          fi

          if [ "$day_match" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build and publish
    needs: gate
    if: needs.gate.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: tools/bpc-fetch/pyproject.toml

      - name: Install Node dependencies
        run: npm ci

      - name: Install embedded bpc-fetch
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./tools/bpc-fetch
          python -m playwright install chromium

      - name: Restore existing reports from gh-pages
        run: |
          mkdir -p daily_reports
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git --work-tree=daily_reports checkout origin/gh-pages -- . || true
            rm -f daily_reports/index.html daily_reports/archive.html
          fi

      - name: Generate report
        env:
          LLM_BACKEND: ${{ vars.LLM_BACKEND }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          REPORT_LOCALE: ${{ vars.REPORT_LOCALE }}
          REPORT_TZ: ${{ vars.REPORT_TZ }}
          WEB_MODE: "true"
          DAILY_ENRICH_CONCURRENCY: ${{ vars.DAILY_ENRICH_CONCURRENCY || '3' }}
        run: npm run daily

      - name: Build static site
        run: npm run build-site

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./daily_reports
          publish_branch: gh-pages
          keep_files: false
          commit_message: "daily: report for ${{ github.run_id }}"

      - name: Notify Feishu
        if: success()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          REPORT_LOCALE: ${{ vars.REPORT_LOCALE }}
        run: |
          set -euo pipefail

          if [ -z "${FEISHU_WEBHOOK:-}" ]; then
            echo "FEISHU_WEBHOOK not set, skipping"
            exit 0
          fi

          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            PAGE_URL="https://${OWNER}.github.io/"
          else
            PAGE_URL="https://${OWNER}.github.io/${REPO_NAME}/"
          fi

          TODAY="$(date -u +%Y-%m-%d)"
          if [ "${REPORT_LOCALE:-zh}" = "en" ]; then
            TEXT="$(printf 'Daily Brief published successfully.\nRepo: %s\nDate: %s\nPage: %s' "${GITHUB_REPOSITORY}" "${TODAY}" "${PAGE_URL}")"
          else
            TEXT="$(printf '日报发布成功。\n仓库：%s\n日期：%s\n页面：%s' "${GITHUB_REPOSITORY}" "${TODAY}" "${PAGE_URL}")"
          fi

          PAYLOAD=$(printf '%s' "$TEXT" | python -c "import json,sys; print(json.dumps({'msg_type':'text','content':{'text':sys.stdin.read()}}, ensure_ascii=False))")
          curl -sS -X POST "${FEISHU_WEBHOOK}" -H "Content-Type: application/json" -d "$PAYLOAD"
